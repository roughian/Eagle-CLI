name: Tests

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package
        run: python -m pip install -e .

      - name: Compile CLI sources
        run: python -m py_compile cli_anything/eagle/eagle_cli.py cli_anything/eagle/core/bridge.py cli_anything/eagle/core/selection.py

      - name: Validate companion plugin script
        run: |
          node --check companion-plugin/plugin.js
          node --check cli_anything/eagle/assets/companion-plugin/plugin.js

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
