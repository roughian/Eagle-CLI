<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CLI-Anything Eagle Bridge</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 20px;
        background: #0f172a;
        color: #e2e8f0;
      }

      main {
        max-width: 820px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 16px;
        color: #cbd5e1;
      }

      .card {
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(15, 23, 42, 0.85);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .status {
        font-weight: 700;
        color: #38bdf8;
      }

      pre {
        background: rgba(2, 6, 23, 0.8);
        border-radius: 12px;
        padding: 14px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>CLI-Anything Eagle Bridge</h1>
        <p>
          Background service for queued context, selection, open, tag, rename,
          and move commands from the <code>cli-anything-eagle</code> CLI.
        </p>
        <div>Status: <span id="status" class="status">starting</span></div>
      </div>

      <div class="card">
        <strong>Shared State</strong>
        <pre id="state-path"></pre>
      </div>

      <div class="card">
        <strong>Recent Activity</strong>
        <pre id="log"></pre>
      </div>
    </main>

    <script src="plugin.js"></script>
  </body>
</html>
